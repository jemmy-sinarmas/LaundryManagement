# Self-hosting stack — build the images on THIS server, serve everything behind a
# single HTTPS origin via Caddy. Only Caddy is exposed to the internet (80/443);
# web and api stay on the internal Docker network.
#
# PostgreSQL is EXTERNAL: it runs on the Docker host (not as a container). The api
# container reaches it via host.docker.internal (mapped to the host gateway by the
# extra_hosts entry below). DATABASE_URL in .env therefore uses host
# host.docker.internal — NOT localhost (localhost inside a container is the
# container itself).
#
# The browser talks to one origin (https://$DOMAIN). Requests to /api/* are
# reverse-proxied to the Fastify API with the /api prefix stripped, so the auth
# cookie stays same-origin with the web app and no CORS is involved.
#
# Full runbook: docs/DEPLOYMENT.md
# Usage:
#   cp .env.deploy.example .env        # then fill in real values
#   docker compose -f docker-compose.deploy.yml build
#   docker compose -f docker-compose.deploy.yml run --rm api \
#       node apps/api/dist/migrations/run.js --seed   # first deploy only
#   docker compose -f docker-compose.deploy.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      NODE_ENV: production
      PORT: 4000
    # Resolve host.docker.internal to the Docker host so the container can reach
    # the external PostgreSQL running on the host. Required on Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Same-origin: the browser calls /api/*, Caddy proxies it to the API.
        # This is baked into the web bundle at build time (NEXT_PUBLIC_*).
        NEXT_PUBLIC_API_URL: /api
    environment:
      # The web middleware verifies the auth cookie with the SAME secret the
      # API signs it with — these MUST match.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
