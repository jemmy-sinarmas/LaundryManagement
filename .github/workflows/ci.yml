name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, main]

jobs:
  ci:
    runs-on: ubuntu-latest

    # Postgres service so the integration suite has a real DB to run against.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (api + web)
        run: pnpm run typecheck

      - name: Lint (api + web)
        run: pnpm run lint

      - name: Unit tests
        run: pnpm --filter @laundry-palu/api run test

      # The integration global-setup reads apps/api/.env.test (gitignored), so create it
      # here pointing at the Postgres service container. global-setup creates the
      # laundry_palu_test database and applies migrations on first run.
      - name: Create .env.test for integration suite
        run: |
          cat > apps/api/.env.test <<'EOF'
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/laundry_palu_test
          JWT_SECRET=ci-integration-test-secret-0123456789-abcdef
          JWT_EXPIRES_IN=1h
          CORS_ORIGIN=http://localhost:3000
          NODE_ENV=test
          PORT=4001
          EOF

      - name: Integration tests
        run: pnpm --filter @laundry-palu/api run test:integration
